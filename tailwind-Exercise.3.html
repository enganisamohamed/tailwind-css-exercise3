<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Layout</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

  <!-- Parent Box -->
  <div class="bg-gray-200 p-5 rounded-2xl">

    <!-- Grid -->
    <div class="grid grid-cols-3    gap-4 w-[900px]">

      <!-- Big Box -->
      <div class="col-span-2 row-span-2  bg-blue-500 text-white rounded-2xl shadow-xl h-52 grid place-items-center  text-2xl font-bold">
        Featured Image
      </div>

      <!-- Right Boxes -->
      <div class="  bg-green-500 text-white rounded-2xl shadow-xl h-24  grid place-items-center justify-center items-center text-xl font-semibold">
        Image 2
      </div>

      <div class="bg-green-500 text-white rounded-2xl shadow-xl h-24 grid place-items-center text-xl font-semibold">
        Image 3
      </div>

      <!-- Bottom Boxes -->
      <div class="bg-purple-500 text-white rounded-2xl shadow-xl h-24 justify-center  grid place-items-center  text-xl font-semibold">
        Image 4
      </div>

      <div class="bg-purple-500 text-white rounded-2xl shadow-xl h-24  grid place-items-center text-xl font-semibold">
        Image 5
      </div>

      <div class="bg-purple-500 text-white rounded-2xl shadow-xl h-24 grid place-items-center text-xl font-semibold">
        Image 6
      </div>

    </div>

  </div>

</body>
</html>
